name: Scan for leaked secrets

on:
  push:
    branches: [main, master, finetuning]
  workflow_dispatch:
  schedule:
    # Weekly Sunday 03:00 UTC scan (your repos are quiet on weekends)
    - cron: "0 3 * * 0"

permissions:
  contents: read
  issues: write   # for weekly audit issue creation
  actions: read

jobs:
  gitleaks:
    name: gitleaks (gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks (use repo-local config if present)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # The action auto-detects .gitleaks.toml in the workspace root.
          # If absent, gitleaks runs with default ruleset only (no noise allowlist beyond defaults).
          GITHUB_WORKSPACE: ${{ github.workspace }}

  trufflehog-audit:
    name: TruffleHog (weekly deep audit)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (verified only)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Open audit issue if anything verified
        if: steps.trufflehog.outputs.verified_secrets > 0
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `馃攼 TruffleHog weekly audit: ${context.runId}`,
              body: `Verified secret(s) detected by TruffleHog.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nTriage immediately.`
            });