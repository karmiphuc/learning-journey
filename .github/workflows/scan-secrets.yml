name: Scan for leaked secrets

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Weekly Sunday 03:00 UTC scan (your repos are quiet on weekends)
    - cron: "0 3 * * 0"

permissions:
  contents: read
  issues: write   # for weekly audit issue creation
  actions: read

jobs:
  gitleaks:
    name: gitleaks (gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # Use repo-local .gitleaks.toml if present (extends defaults), else apply inline noise allowlist
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          if [[ -f "$GITHUB_WORKSPACE/.gitleaks.toml" ]]; then
            echo "Using repo-local .gitleaks.toml"
            gitleaks detect --redact --no-banner --source "$GITHUB_WORKSPACE" --config "$GITHUB_WORKSPACE/.gitleaks.toml" --verbose
          else
            echo "Using inline noise allowlist"
            cat > /tmp/gitleaks.toml <<'EOF'
          [extend]
          useDefault = true
          [allowlist]
          paths = [
            '''**/*.lock''',
            '''**/*.png''',
            '''**/*.jpg''',
            '''**/*.svg''',
            '''LICENSE''',
            '''LICENSE.md''',
            '''LICENSE.txt'''
          ]
          description = "Personal noise allowlist: lockfiles + binaries + license files only"
          EOF
            gitleaks detect --redact --no-banner --source "$GITHUB_WORKSPACE" --config /tmp/gitleaks.toml --verbose
          fi

  trufflehog-audit:
    name: TruffleHog (weekly deep audit)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (verified only)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Open audit issue if anything verified
        if: steps.trufflehog.outputs.verified_secrets > 0
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔐 TruffleHog weekly audit: ${context.runId}`,
              body: `Verified secret(s) detected by TruffleHog.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nTriage immediately.`
            });