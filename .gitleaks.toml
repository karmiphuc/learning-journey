# learning-journey gitleaks config — extends default + noise allowlist
[extend]
useDefault = true
[allowlist]
paths = [
  '''.*\.lock$''',
  '''.*\.png$''',
  '''.*\.jpg$''',
  '''.*\.svg$''',
  '''.*\.gif$''',
  '''LICENSE$''',
  '''LICENSE\.md$''',
  '''LICENSE\.txt$''',
  '''CHANGELOG.*''',
  # Archived web scrapes from 2018: contain public recaptcha sitekeys + ephemeral tokens, not credentials
  '''2018-06-02Amazing_History_Facts\.htm$'''
]
description = "Generic allowlist + archived 2018 web scrapes with public-only keys"